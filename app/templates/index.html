<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détecteur de Fake News</title>
    <!-- Modern Clean Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --success: #059669;
            --success-bg: #d1fae5;
            --danger: #dc2626;
            --danger-bg: #fee2e2;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            position: relative;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 14px;
        }

        .lang-switch a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .lang-switch a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: var(--text-main);
        }

        .header p {
            color: var(--text-muted);
            font-size: 16px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-main);
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
            background-color: #fcfcfc;
            color: var(--text-main);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: #ffffff;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .error {
            color: var(--danger);
            font-size: 14px;
            margin-top: -10px;
            margin-bottom: 15px;
            background-color: var(--danger-bg);
            padding: 10px 12px;
            border-radius: 6px;
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
        }

        .result.fake {
            background-color: var(--danger-bg);
            color: var(--danger);
            border: 1px solid rgba(220, 38, 38, 0.2);
        }

        .result.real {
            background-color: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(5, 150, 105, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="lang-switch">
            <a href="/ar">العربية (Arabe)</a>
        </div>

        <div class="header">
            <h1>Détecteur de Fake News 🕵️‍♂️</h1>
            <p>Vérifiez instantanément la crédibilité des articles de presse.</p>
        </div>

        <form action="/predict?lang=fr" method="POST">
            <div class="form-group">
                <label for="news_text">Contenu de l'article</label>
                <textarea id="news_text" name="news_text"
                    placeholder="Collez le texte ou l'extrait de l'actualité ici..."
                    required>{% if news_text %}{{ news_text }}{% endif %}</textarea>
            </div>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <button type="submit">Vérifier la crédibilité</button>
        </form>

        {% if result %}
        <div class="result {% if is_fake %}fake{% else %}real{% endif %}">
            Résultat : {{ result }}
        </div>
        {% endif %}
    </div>
</body>

</html>
